# ============================================================================
# aisec-vulntriage configuration
# Committed shared defaults only (scan scope, language, caps, thresholds) — no
# secrets, no per-deployment state. Deployment-specific values (the Discord
# channel id, the AWS profile, etc.) go in a git-ignored .env (copy .env.example),
# NOT here.
# AWS credentials and the Discord bot token are configured in OpenClaw / the host
# credential chain (see ../../docs/HOST-SETUP.md), never in this workspace.
#
# SECURITY: this harness is READ-ONLY by construction. It authenticates to AWS
# with a read-only role (SecurityAudit + ViewOnlyAccess) and never mutates the
# account. Nothing in this file can grant write access. See DESIGN.md §3.
# ============================================================================

[aws]
# Regions Prowler scans. Empty list = Prowler's default (all enabled regions),
# which is slower and noisier; scope this to the regions you actually use.
regions = ["us-east-1"]

# Optional AWS named profile. Usually left empty here and supplied via .env
# (VULNTRIAGE_AWS_PROFILE) or the host's default credential chain. The role this
# resolves to MUST be read-only (SecurityAudit + ViewOnlyAccess) — the harness's
# safety guarantee is enforced by IAM, not by this config.
profile = ""

[prowler]
# Pinned Prowler CLI. The collector runs `prowler --version` and refuses to run if
# the installed version does not start with this string (supply-chain hygiene: a
# surprise upgrade can change output shape). Set to the major series ("5.") to
# allow patch drift, or a full version ("5.5.0") to pin exactly. Empty = skip check.
version = "5."

# Scope of checks. Empty lists mean Prowler defaults. Narrower scope = faster runs
# and less noise for the triage LLM to sort. See `prowler aws --list-services`.
services = ["ec2", "s3", "iam", "rds", "awslambda"]   # AWS services to scan (Prowler names; Lambda is "awslambda")
compliance = []                                     # e.g. ["cis_3.0_aws"]; empty = all checks

# Which finding statuses to collect from Prowler's output. FAIL is what needs
# triage; PASS/MANUAL/INFO are dropped. (Prowler status_code values.)
statuses = ["FAIL"]

# Keep only findings at or above these Prowler-assigned severities. This is a
# coarse pre-filter before the LLM triage; the LLM still re-prioritizes using
# KEV/EPSS/exposure (a low-severity misconfig on an internet-exposed asset can be
# escalated). Valid: critical, high, medium, low, informational.
severities = ["critical", "high", "medium"]

[enrich]
# Free public intel feeds used to enrich any CVE ids referenced by a finding.
# (Prowler CSPM findings are mostly misconfigurations and often carry no CVE; CVE
# coverage broadens in roadmap stage 3 when Trivy is added — see DESIGN §8.)
kev = true    # CISA Known Exploited Vulnerabilities catalog membership (single fetch)
epss = true   # FIRST EPSS exploit-probability score (batched API)
nvd = false   # NVD CVSS metadata. OFF by default: NVD's unauthenticated rate limit
              # (5 req / 30s) makes many-CVE runs slow. KEV + EPSS already give the
              # decisive triage signals. Enable only if you need CVSS in the rationale.

[triage]
# Forward-looking guardrails consumed by run.py (the triage step), not the
# collector. The LLM assigns priority, but deterministic code can floor it so a
# clearly-dangerous finding is never labelled low: recall on High matters more than
# precision (a missed High is worse than an over-flagged Medium — see DESIGN §5).
kev_forces_at_least = "High"   # any KEV-listed CVE floors priority to at least this
epss_high_threshold = 0.5      # EPSS >= this floors priority to at least High
exposure_forces_at_least = "High"  # internet-exposed finding floors to at least this

[output]
# Language for the generated triage rationale posted to Discord ("ja", "en", ...).
language = "ja"

# Number of findings per LLM triage call. Findings are split into chunks of this
# size and judged in separate, stateless `openclaw agent` calls — smaller chunks
# keep each prompt focused and isolate failures (a bad chunk retries next run
# without sinking the whole run).
llm_batch_size = 8

# Digest mode — fold findings into a compact digest instead of one Discord message
# per finding. A full multi-service scan can surface 100+ findings; posting each one
# individually floods the channel. With digest=true a run posts a header (counts by
# priority) + a detail block for the high-signal priorities, and represents the rest
# by count only. Set false to post one message per finding (verbose, legacy behavior).
digest = true

# Which priorities are ELIGIBLE for an individual detail message in the digest.
# Findings at any OTHER priority are represented only by their count in the header
# (still triaged, signed into the evidence log, and marked seen). Critical/High are
# act-now; Medium/Low are usually reviewed in bulk via Prowler directly. This is the
# POST-floor priority, so an internet-exposed / KEV finding floored up to High is
# eligible. Ordering within the digest is most-urgent first.
detail_priorities = ["Critical", "High"]

# Hard cap on how many findings get their OWN Discord message (one finding per
# message — packing multiple findings per message is unsafe because OpenClaw's Discord
# send path re-chunks long messages and can split one mid-rationale). The top N most-
# urgent detail-eligible findings are posted individually; any beyond N are summarized
# by a "…and M more" line and represented by the header count. This bounds Discord
# volume to ~N+2 messages no matter how many findings a scan surfaces. The overflow
# findings are still triaged, signed into the evidence log, and marked seen — review
# them via the evidence log or Prowler directly.
detail_top_n = 12

# Weekly full re-digest. On normal days digest mode shows only NEW (unseen) findings
# and folds the rest into header counts, so a still-open finding that was already
# reported — and therefore marked seen — is never re-surfaced (the ledger assumes you
# consult Prowler directly for those). That means a still-open Medium, or any Critical/
# High past detail_top_n, can stay invisible indefinitely. To counter that, on the
# weekday named here (mon/tue/wed/thu/fri/sat/sun, host-local time) the run re-digests
# ALL currently-open findings — not just new ones — ignoring detail_top_n and posting
# every Critical/High individually, so nothing open stays hidden for more than a week.
# This is DISPLAY scope only: the seen ledger is left untouched (already-seen findings
# stay seen, are never un-marked, and are not re-posted on normal days), so it never
# re-posts something you've resolved and never breaks dedup. Empty = disabled (only new
# findings are ever shown). Trade-off: the chosen day does one extra re-triage of every
# open finding and posts a burst of Critical/High messages — pick a low-traffic weekday.
full_digest_weekday = "mon"

[graph]
# Stage 2 graph context (Cartography + Neo4j) — see DESIGN.md §12. OFF by default:
# v1 users are unaffected and the harness keeps using the keyword exposure flag. When
# enabled, the collector reads deterministic exposure_path / blast_radius facts from a
# Cartography-populated Neo4j: the graph-derived exposure_path overrides the keyword
# internet_exposed flag, blast_radius grounds excess_privilege, and a graph-confirmed
# toxic combination (exposure + over-privilege + KEV/high-EPSS) floors priority to Critical.
# Still READ-ONLY and B2-preserving: Cartography (an external CLI, like Prowler) builds
# the graph from the SAME read-only role; the collector only QUERIES it over Neo4j's
# HTTP Cypher endpoint with stdlib urllib (no bolt driver). The Neo4j password is a
# SECRET and lives in the environment (VULNTRIAGE_NEO4J_PASSWORD), never here or in .env.
enabled = false

# Neo4j HTTP transactional Cypher endpoint. Bind Neo4j to localhost only — the graph is
# a sensitive map of your asset topology and must never be network-exposed (DESIGN §12.3).
neo4j_http_endpoint = "http://localhost:7474"
neo4j_user = "neo4j"
neo4j_database = "neo4j"
